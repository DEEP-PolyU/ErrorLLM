model_name_or_path: model/codes-7b-ext
trust_remote_code: true

stage: error_detection
do_train: true
finetuning_type: lora

lora_rank: 32
lora_alpha: 64
lora_dropout: 0.1
lora_target: c_attn,c_proj,c_fc
additional_target: wte,lm_head

focal_gamma: 0.0
freeze_original_embeddings: true
initialize_embeddings: true
use_constrained_decoding: true
constraint_type: simple

dataset_dir: src/training
dataset: error_detection_bird
template: default
cutoff_len: 4096
preprocessing_num_workers: 8
dataloader_num_workers: 4

output_dir: output/error_detector
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000

val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
seed: 42
